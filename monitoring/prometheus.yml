global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "mlops-api"
    metrics_path: /metrics
    static_configs:
      - targets: ["api:8000"]
        labels:
          service: "mlops-platform"

  - job_name: "mlflow"
    metrics_path: /health
    static_configs:
      - targets: ["mlflow:5000"]
        labels:
          service: "mlflow"

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

rule_files:
  - /etc/prometheus/rules.yml